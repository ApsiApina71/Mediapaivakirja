{% extends "layout.html" %}

{% block content %}
<h2>Muokkaa teosta</h2>
<form action="/edit/{{ work.id }}" method="POST">
    Nimi: <input type="text" name="title" value="{{ work.title }}" required><br>
    Kuvaus: <textarea name="description">{{ work.description }}</textarea><br>
    <button type="submit">Tallenna muutokset</button>
</form>
<br>
<a href="/work/{{ work.id }}">Peruuta</a>
{% endblock %}
